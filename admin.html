<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Suite | Cadet Stationery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-login-container {
            max-width: 450px;
            margin: 15% auto;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 50px;
            text-align: center;
        }
        .dashboard-container {
            display: none;
            padding: 100px 5%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            text-align: center;
        }
        .stat-card h4 {
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }
        .stat-card p {
            font-size: 2rem;
            font-weight: 700;
        }
        .product-manager {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            margin-bottom: 30px;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        .product-table th, .product-table td {
            text-align: left;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .product-table th {
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .action-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-white);
            padding: 5px 15px;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .action-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .hidden { display: none; }
        
        @media (max-width: 1024px) {
            .admin-split { grid-template-columns: 1fr !important; }
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">CADET <span>EXECUTIVE</span></a>
        <div>
            <button id="logoutBtn" class="action-btn hidden" onclick="adminLogout()">Logout</button>
        </div>
    </header>

    <!-- Login Area -->
    <div id="loginArea" class="admin-login-container">
        <h2 style="margin-bottom: 30px;">Access Secure Suite</h2>
        <div class="input-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" id="adminUsername" placeholder="Enter ID">
        </div>
        <div class="input-group" style="text-align: left;">
            <label>Security Key</label>
            <input type="password" id="adminPassword" placeholder="••••••••">
        </div>
        <button class="btn-premium" style="width: 100%; margin-top: 20px;" onclick="adminLogin()">Authenticate</button>
    </div>

    <!-- Dashboard Area -->
    <div id="dashboardArea" class="dashboard-container">
        <h1 style="margin-bottom: 50px;">Store Commander</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Items</h4>
                <p id="totalProducts">0</p>
            </div>
            <div class="stat-card">
                <h4>Inquiries</h4>
                <p>12</p>
            </div>
            <div class="stat-card">
                <h4>Portfolio Value</h4>
                <p id="portfolioValue">Rs. 850k</p>
            </div>
        </div>

        <!-- Product Form (Hidden by default) -->
        <div id="productForm" class="product-manager hidden" style="margin-bottom: 40px; border-color: var(--accent-gold);">
            <h3 id="formTitle">Add New Masterpiece</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
                <input type="hidden" id="editIndex">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="p_name" placeholder="e.g. Gold Pen">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="p_cat" style="width: 100%; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px;">
                        <option value="writing">Writing Instruments</option>
                        <option value="paper">Paper & Journals</option>
                        <option value="tools">Desk Tools</option>
                        <option value="gifts">Artisan Gifts</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Price (Rs.)</label>
                    <input type="text" id="p_price" placeholder="e.g. Rs. 5,000">
                </div>
                <div class="input-group">
                    <label>Product Image</label>
                    <input type="file" id="p_file" accept="image/*" onchange="previewImage(this)" style="margin-bottom: 10px;">
                    <input type="text" id="p_img" placeholder="Or Paste Image URL">
                </div>
            </div>
            <div id="imgPreview" style="margin: 20px 0; display: none;">
                <img id="previewTag" src="" style="height: 100px; border: 1px solid var(--accent-gold);">
                <p style="font-size: 0.7rem; color: #999;">Image Preview</p>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn-premium" onclick="saveProductEntry()">Save Product</button>
                <button class="action-btn" onclick="closeProductForm()" style="margin-left: 10px;">Cancel</button>
            </div>
        </div>

        <div class="admin-split" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px;">
            <!-- Inventory Management -->
            <div class="product-manager">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Inventory Control</h3>
                    <div>
                        <button class="action-btn" onclick="resetInventory()" style="margin-right: 10px;">Reset</button>
                        <button class="action-btn" onclick="showAddForm()" style="border-color: var(--accent-gold); color: var(--accent-gold);">+ New Product</button>
                    </div>
                </div>

                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductRoot">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
            </div>

            <!-- Website CMS (Story Section) -->
            <div class="product-manager" style="border-color: #444;">
                <h3 style="margin-bottom: 20px;">Website Editor (CMS)</h3>
                <div class="input-group">
                    <label>Story Page Title</label>
                    <input type="text" id="cms_story_title" placeholder="The Art of Fine Writing">
                </div>
                <div class="input-group">
                    <label>Story Quote</label>
                    <input type="text" id="cms_story_quote" placeholder="A pen is more than a tool...">
                </div>
                <div class="input-group">
                    <label>Story Content</label>
                    <textarea id="cms_story_text" rows="5" style="width: 100%; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px; font-family: inherit; line-height: 1.6;"></textarea>
                </div>
                <div class="input-group">
                    <label>Profile DP (Mobile View)</label>
                    <input type="file" id="cms_dp_file" accept="image/*" onchange="previewDpImage(this)" style="margin-bottom: 10px;">
                    <input type="text" id="cms_dp_img" placeholder="DP Image URL">
                </div>
                <div class="input-group">
                    <label>Philosophy Title (Urdu/Eng)</label>
                    <input type="text" id="cms_phil_title" placeholder="ہمارا نظریہ / Our Philosophy">
                </div>
                <div class="input-group">
                    <label>Philosophy Text (Urdu/Eng)</label>
                    <textarea id="cms_phil_text" rows="5" style="width: 100%; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px; font-family: inherit; line-height: 1.6;"></textarea>
                </div>
                <div class="input-group">
                    <label>Story Header Image</label>
                    <input type="file" id="cms_story_file" accept="image/*" onchange="previewCmsImage(this)" style="margin-bottom: 10px;">
                    <input type="text" id="cms_story_img" placeholder="Image URL">
                    <div id="cmsImgPreview" style="margin-top: 10px; display: none;">
                        <img id="cmsPreviewTag" src="" style="height: 100px; border: 1px solid var(--accent-gold);">
                    </div>
                </div>
                <button class="btn-premium" style="width: 100%; margin-top: 10px;" onclick="saveCmsData()">Update Website Content</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
